name: Windows Installer

# Builds the native Windows installer (VibeSeller-Setup.exe) on a
# GitHub-hosted windows-latest runner — the only place this can be
# built/validated, since wheels are win_amd64, python-build-standalone
# is per-OS, and Inno Setup compiles on Windows. Then silently installs
# the built package and runs the SAME smoke + light agent e2e the
# release pipeline runs on Linux, proving the server works on Windows.
# See installer/windows/README.md.

on:
  pull_request:
    branches: [main]
    paths:
      - 'installer/windows/**'
      - '.github/workflows/windows-installer.yml'
      - 'pyproject.toml'
      - 'app/**'
      - 'frontend/**'
      - 'tests/releases/**'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'Installer version string'
        required: false
        default: '0.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # Fork PRs don't get repo secrets — gate the model-dependent
      # agent e2e on this so PR CI (build + install + smoke) stays
      # reliable for forks; the e2e still runs on same-repo branches.
      HAS_DEEPSEEK: ${{ secrets.DEEPSEEK_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.app_version }}"
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = "0.0.0" }
          .\installer\windows\build.ps1 -AppVersion $ver

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSeller-Setup
          path: installer/windows/out/VibeSeller-Setup.exe
          if-no-files-found: error
          retention-days: 14

      # --- Verify the BUILT PACKAGE works on Windows -----------------
      - name: Silent-install the built package
        shell: pwsh
        run: |
          $exe = "installer\windows\out\VibeSeller-Setup.exe"
          # Inno silent flags; post-install [Run] builds the venv +
          # installs wheels + playwright. The tray launch is skipifsilent.
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "installer exited $($p.ExitCode)" }
          $install = "$env:LOCALAPPDATA\Programs\VibeSeller"
          if (-not (Test-Path "$install\.venv\Scripts\vibe-seller.exe")) {
            throw "vibe-seller.exe not found under $install after install"
          }
          echo "VS_INSTALL=$install" >> $env:GITHUB_ENV

      - name: Start server (background)
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          # Replicate the tray's PATH augmentation so the agent
          # subprocess can find the bundled claude + git/bash.
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\mingit\cmd;$install\mingit\usr\bin;$env:PATH"
          # Reuse the bundled interpreter for the agent venv (the tray
          # sets this on a real install).
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777

      - name: Smoke test (verify_install.sh — health + store/profile API)
        shell: bash
        run: |
          export PATH="$VS_INSTALL/.venv/Scripts:$PATH"
          # Empty version arg → skip the version-match check (this is a
          # dev build, not a published release).
          bash tests/releases/verify_install.sh ""

      - name: Install pytest deps into the bundled venv (for agent e2e)
        if: env.HAS_DEEPSEEK == 'true'
        shell: pwsh
        run: |
          $py = "$env:VS_INSTALL\.venv\Scripts\python.exe"
          & "$env:VS_INSTALL\uv.exe" pip install --python $py `
            pytest pytest-asyncio httpx pytest-playwright

      - name: Light agent e2e against the installed daemon
        if: env.HAS_DEEPSEEK == 'true'
        shell: pwsh
        env:
          E2E_BASE_URL: http://127.0.0.1:7777
          E2E_PROVIDER_MAP: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          API_TIMEOUT_MS: '3000000'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
          VIBE_SELLER_TELEMETRY: '0'
        run: |
          $install = $env:VS_INSTALL
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\mingit\cmd;$install\mingit\usr\bin;$env:PATH"
          & "$install\.venv\Scripts\python.exe" -m pytest `
            tests/e2e/test_llm_browser.py::TestLLMBrowserAPI::test_agent_reads_homepage `
            --e2e -v --log-cli-level=INFO

      - name: Verify the agent venv reused the bundled Python
        if: env.HAS_DEEPSEEK == 'true'
        shell: pwsh
        run: |
          # The e2e task created ~/.vibe-seller/.venv. Its pyvenv.cfg must
          # point back at the bundled interpreter — proving `uv venv`
          # reused it instead of downloading a second Python.
          $cfg = "$env:USERPROFILE\.vibe-seller\.venv\pyvenv.cfg"
          if (-not (Test-Path $cfg)) {
            throw "agent venv not created — cannot verify Python reuse"
          }
          $text = Get-Content $cfg -Raw
          Write-Host $text
          $bundled = "$env:VS_INSTALL\python"
          if ($text -notmatch [regex]::Escape($bundled)) {
            throw "agent venv did NOT reuse the bundled Python (no '$bundled' in pyvenv.cfg)"
          }
          Write-Host "OK: agent venv reused the bundled Python ($bundled)"

      - name: Stop server + dump logs
        if: always()
        shell: pwsh
        run: |
          & "$env:VS_INSTALL\.venv\Scripts\vibe-seller.exe" stop --port 7777
          $log = "$env:USERPROFILE\.vibe-seller\logs\backend_7777.log"
          if (Test-Path $log) { Get-Content -Tail 40 $log }

  # Prove the in-place upgrade works: build two versions, install the
  # old one, point the updater at a LOCAL mock release (no real GitHub
  # release), upgrade, and assert the running server reports the NEW
  # version + a smoke passes on the upgraded build.
  upgrade:
    name: Upgrade old -> new (in-place)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build OLD installer (0.0.1)
        shell: pwsh
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: '0.0.1'
        run: |
          .\installer\windows\build.ps1 -AppVersion 0.0.1 `
            -StagingDir "$env:GITHUB_WORKSPACE\installer\windows\stagingA" `
            -OutputDir  "$env:GITHUB_WORKSPACE\installer\windows\outA"

      - name: Build NEW installer (0.0.2)
        shell: pwsh
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: '0.0.2'
        run: |
          .\installer\windows\build.ps1 -AppVersion 0.0.2 `
            -StagingDir "$env:GITHUB_WORKSPACE\installer\windows\stagingB" `
            -OutputDir  "$env:GITHUB_WORKSPACE\installer\windows\outB"

      - name: Install OLD (0.0.1)
        shell: pwsh
        run: |
          $exe = "$env:GITHUB_WORKSPACE\installer\windows\outA\VibeSeller-Setup.exe"
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "old installer exited $($p.ExitCode)" }
          echo "VS_INSTALL=$env:LOCALAPPDATA\Programs\VibeSeller" >> $env:GITHUB_ENV

      - name: Start OLD server, assert version 0.0.1
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\mingit\cmd;$install\mingit\usr\bin;$env:PATH"
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              $v = (Invoke-RestMethod http://127.0.0.1:7777/api/version -TimeoutSec 3).version
              Write-Host "version=$v"; if ($v -eq '0.0.1') { $ok = $true; break }
            } catch { }
            Start-Sleep 2
          }
          if (-not $ok) { throw "OLD server did not report 0.0.1" }

      - name: Updater detects + downloads NEW release (local mock)
        shell: pwsh
        run: |
          $exeB = "$env:GITHUB_WORKSPACE\installer\windows\outB\VibeSeller-Setup.exe"
          $rel = @{
            tag_name = 'v0.0.2'
            assets = @(@{ name = 'VibeSeller-Setup.exe'; browser_download_url = ([System.Uri]$exeB).AbsoluteUri })
          } | ConvertTo-Json -Depth 5
          $relPath = "$env:GITHUB_WORKSPACE\release.json"
          Set-Content -Path $relPath -Value $rel -Encoding utf8
          $env:VIBE_SELLER_RELEASES_URL = ([System.Uri]$relPath).AbsoluteUri
          & "$env:VS_INSTALL\.venv\Scripts\python.exe" -c "from app import windows_update as w; from pathlib import Path; import tempfile; u = w.check_for_update(); assert u and u['version'] == '0.0.2', u; p = w.download_installer(u['url'], Path(tempfile.gettempdir()) / 'dl.exe'); assert p.stat().st_size > 0; print('detected + downloaded', u['version'])"

      - name: Stop OLD server (release file locks)
        shell: pwsh
        run: '& "$env:VS_INSTALL\.venv\Scripts\vibe-seller.exe" stop --port 7777'

      - name: Upgrade in place (silent-install NEW)
        shell: pwsh
        run: |
          $exe = "$env:GITHUB_WORKSPACE\installer\windows\outB\VibeSeller-Setup.exe"
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "new installer exited $($p.ExitCode)" }

      - name: Start UPGRADED server, assert version 0.0.2
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\mingit\cmd;$install\mingit\usr\bin;$env:PATH"
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              $v = (Invoke-RestMethod http://127.0.0.1:7777/api/version -TimeoutSec 3).version
              Write-Host "version=$v"; if ($v -eq '0.0.2') { $ok = $true; break }
            } catch { }
            Start-Sleep 2
          }
          if (-not $ok) { throw "UPGRADED server did not report 0.0.2 (upgrade failed)" }

      - name: Basic e2e on the UPGRADED build (health + store/profile API)
        shell: bash
        run: |
          export PATH="$VS_INSTALL/.venv/Scripts:$PATH"
          bash tests/releases/verify_install.sh "0.0.2"

      - name: Stop server + dump logs
        if: always()
        shell: pwsh
        run: |
          & "$env:VS_INSTALL\.venv\Scripts\vibe-seller.exe" stop --port 7777
          $log = "$env:USERPROFILE\.vibe-seller\logs\backend_7777.log"
          if (Test-Path $log) { Get-Content -Tail 40 $log }
