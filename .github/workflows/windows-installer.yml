name: Windows Installer

# Builds the native Windows installer (VibeSeller-Setup.exe) on a
# GitHub-hosted windows-latest runner — the only place this can be
# built/validated, since wheels are win_amd64, python-build-standalone
# is per-OS, and Inno Setup compiles on Windows. Then silently installs
# the built package and runs the SAME smoke + light agent e2e the
# release pipeline runs on Linux, proving the server works on Windows.
# See installer/windows/README.md.

on:
  pull_request:
    branches: [main]
    paths:
      - 'installer/windows/**'
      - '.github/workflows/windows-installer.yml'
      - 'pyproject.toml'
      - 'app/**'
      - 'frontend/**'
      - 'tests/releases/**'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'Installer version string'
        required: false
        default: '0.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Per-PR validation: build the installer, install it, smoke + agent e2e.
  # (The heavy in-place upgrade test lives in windows-upgrade.yml and
  # runs on release only — kept separate so it's not a skipped PR check.)
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          # Give every build a unique, monotonic version. CI does a
          # shallow checkout, so setuptools_scm can't derive one and every
          # build ends up 0.0.1.dev1 — which the UI shows identically for
          # all of them and which lets pip/uv treat different builds as the
          # same package. Pin it explicitly, like release.yml does. The run
          # number is monotonic per workflow; the short sha aids tracing.
          $ver = "${{ github.event.inputs.app_version }}"
          if ([string]::IsNullOrWhiteSpace($ver) -or $ver -eq "0.0.0") {
            $sha = "${{ github.sha }}".Substring(0, 8)
            $ver = "0.0.1.dev${{ github.run_number }}+g$sha"
          }
          $env:SETUPTOOLS_SCM_PRETEND_VERSION = $ver
          .\installer\windows\build.ps1 -AppVersion $ver

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSeller-Setup
          path: installer/windows/out/VibeSeller-Setup.exe
          if-no-files-found: error
          retention-days: 14

      # --- Verify the BUILT PACKAGE works on Windows -----------------
      - name: Silent-install the built package
        shell: pwsh
        run: |
          $exe = "installer\windows\out\VibeSeller-Setup.exe"
          # Inno silent flags; post-install [Run] builds the venv +
          # installs wheels + playwright. The tray launch is skipifsilent.
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "installer exited $($p.ExitCode)" }
          $install = "$env:LOCALAPPDATA\Programs\VibeSeller"
          if (-not (Test-Path "$install\.venv\Scripts\vibe-seller.exe")) {
            throw "vibe-seller.exe not found under $install after install"
          }
          echo "VS_INSTALL=$install" >> $env:GITHUB_ENV

      - name: Start server (background)
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          # Strip the runner's pre-installed Git for Windows from PATH so
          # the daemon — and the agent it spawns, which inherits THIS
          # step's env — can only use the BUNDLED toolchain. Without this,
          # Claude Code finds the runner's C:\Program Files\Git bash and CI
          # is a false green that never exercises the shipped bundle a real
          # user gets.
          $clean = ($env:PATH -split ';' | Where-Object { $_ -and $_ -notlike 'C:\Program Files\Git\*' -and $_ -ne 'C:\Program Files\Git' }) -join ';'
          # Replicate the tray's PATH augmentation so the agent subprocess
          # finds the bundled claude + git/bash/curl/perl.
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\git\cmd;$install\git\bin;" +
                      "$install\git\usr\bin;$install\git\mingw64\bin;$clean"
          # Pin Claude Code's Bash tool at the bundled bash.exe (it needs a
          # file literally named bash.exe, else falls back to PowerShell —
          # which can't run the extensionless bash browser-use wrapper).
          $env:CLAUDE_CODE_GIT_BASH_PATH = "$install\git\bin\bash.exe"
          # Reuse the bundled interpreter for the agent venv (the tray
          # sets this on a real install).
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          # AGENT_DEBUG makes backend_7777.log capture the agent's
          # thinking + tool calls, so the uploaded log artifact is
          # actually useful when the agent e2e fails or hangs.
          $env:AGENT_DEBUG = '1'
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777

      - name: Smoke test (verify_install.sh — health + store/profile API)
        shell: bash
        run: |
          export PATH="$VS_INSTALL/.venv/Scripts:$PATH"
          # Empty version arg → skip the version-match check (this is a
          # dev build, not a published release).
          bash tests/releases/verify_install.sh ""

      - name: Verify bundled bash runs the extensionless wrapper shape
        shell: pwsh
        run: |
          # The per-store browser-use wrapper is an extensionless bash
          # script — the exact shape that fails under Claude Code's
          # PowerShell fallback on a machine without bash.exe (the user's
          # "Select an app to open 'browser-use'" dialog). Prove the
          # BUNDLED bash resolves + executes one by bare name off PATH,
          # exactly as the agent's Bash tool does. No LLM, so this guards
          # every PR (incl. forks where the agent e2e is gated off), and a
          # regression to a bundle without bash.exe fails right here.
          $bash = "$env:VS_INSTALL\git\bin\bash.exe"
          if (-not (Test-Path $bash)) { throw "bundled bash.exe missing: $bash" }
          $prog = 'set -e; d="$(mktemp -d)"; printf ''#!/usr/bin/env bash\necho VS_WRAPPER_OK\n'' > "$d/browser-use"; chmod +x "$d/browser-use"; export PATH="$d:$PATH"; browser-use'
          $out = & $bash --login -c $prog
          if ("$out" -notmatch 'VS_WRAPPER_OK') {
            throw "bundled bash could not execute an extensionless wrapper (out: $out)"
          }
          Write-Host "OK: bundled bash executes extensionless shebang wrappers"

      - name: Tray dialog test (responsive dialog + clipboard, headless)
        shell: pwsh
        run: |
          # Verifies the fix for the unresponsive dialog + Copy-to-clipboard
          # on a real desktop session — no manual clicking. Uses the
          # bundled python's tkinter; dialogs.py has no pystray dep.
          $py = "$env:VS_INSTALL\.venv\Scripts\python.exe"
          # pytest-asyncio is needed because the repo's tests/conftest.py
          # imports it at collection time (even for this sync test).
          & "$env:VS_INSTALL\uv.exe" pip install --python $py `
            pytest pytest-asyncio
          & $py -m pytest tests\unit\test_tray_dialog.py -v

      - name: Install pytest deps into the bundled venv (for agent e2e)
        shell: pwsh
        run: |
          $py = "$env:VS_INSTALL\.venv\Scripts\python.exe"
          & "$env:VS_INSTALL\uv.exe" pip install --python $py `
            pytest pytest-asyncio httpx pytest-playwright

      - name: Light agent e2e against the installed daemon
        shell: pwsh
        env:
          E2E_BASE_URL: http://127.0.0.1:7777
          E2E_PROVIDER_MAP: minimax
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
          API_TIMEOUT_MS: '3000000'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
          VIBE_SELLER_TELEMETRY: '0'
        run: |
          $install = $env:VS_INSTALL
          # NOTE: the agent runs under the daemon started in the "Start
          # server" step and inherits THAT step's env (bundled bash, no
          # runner git). This PATH only affects the pytest client here.
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\git\cmd;$install\git\bin;" +
                      "$install\git\usr\bin;$install\git\mingw64\bin;$env:PATH"
          & "$install\.venv\Scripts\python.exe" -m pytest `
            tests/e2e/test_llm_browser.py::TestLLMBrowserAPI::test_agent_reads_homepage `
            --e2e -v --log-cli-level=INFO

      - name: Verify the agent venv reused the bundled Python
        shell: pwsh
        run: |
          # The e2e task created ~/.vibe-seller/.venv. Its pyvenv.cfg must
          # point back at the bundled interpreter — proving `uv venv`
          # reused it instead of downloading a second Python.
          $cfg = "$env:USERPROFILE\.vibe-seller\.venv\pyvenv.cfg"
          if (-not (Test-Path $cfg)) {
            throw "agent venv not created — cannot verify Python reuse"
          }
          $text = Get-Content $cfg -Raw
          Write-Host $text
          $bundled = "$env:VS_INSTALL\python"
          if ($text -notmatch [regex]::Escape($bundled)) {
            throw "agent venv did NOT reuse the bundled Python (no '$bundled' in pyvenv.cfg)"
          }
          Write-Host "OK: agent venv reused the bundled Python ($bundled)"

      - name: Stop server + stage logs
        if: always()
        shell: pwsh
        run: |
          & "$env:VS_INSTALL\.venv\Scripts\vibe-seller.exe" stop --port 7777
          $log = "$env:USERPROFILE\.vibe-seller\logs\backend_7777.log"
          if (Test-Path $log) { Get-Content -Tail 40 $log }
          # Stage logs under the workspace so a failing/hanging agent
          # e2e is debuggable from the artifact, not just this tail.
          $dst = "$env:GITHUB_WORKSPACE\ci-logs"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $logs = "$env:USERPROFILE\.vibe-seller\logs"
          if (Test-Path $logs) { Copy-Item -Recurse -Force $logs "$dst\logs" }

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-e2e-server-logs
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

  # Regression guard: a user who uninstalls WITHOUT quitting the tray
  # leaves a running pythonw.exe that locks .venv\Scripts\pythonw.exe, so
  # the uninstaller can't fully remove .venv; the next install's `uv venv`
  # then refuses the partial dir and the browser-engine step dies with
  # "playwright.exe ... cannot find the file specified". Reproduce it
  # deterministically and assert the venv rebuilds. No LLM/secrets, so it
  # guards every PR (incl. forks).
  uninstall-reinstall:
    name: Uninstall (python running) -> reinstall
    runs-on: windows-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Download the built installer
        uses: actions/download-artifact@v4
        with:
          name: VibeSeller-Setup
          path: installer-dl

      - name: Install
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "installer-dl\VibeSeller-Setup.exe" -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "install exited $($p.ExitCode)" }
          $install = "$env:LOCALAPPDATA\Programs\VibeSeller"
          if (-not (Test-Path "$install\.venv\Scripts\playwright.exe")) {
            throw "first install did not build the venv"
          }
          echo "VS_INSTALL=$install" >> $env:GITHUB_ENV

      - name: Hold a venv python open (locks .venv, like the tray)
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          $py = "$install\.venv\Scripts\python.exe"
          # Mimic the running tray at uninstall time: keep a python process
          # from the install alive with a NATIVE venv extension loaded, so a
          # file *inside* .venv stays locked (the real tray does this via
          # pystray/PIL). A bare `time.sleep` touches no .venv file and would
          # not reproduce the partial-.venv bug; importing Pillow's C ext
          # locks .venv\Lib\site-packages\PIL\_imaging*.pyd.
          #
          # First prove the interpreter runs and PIL imports SYNCHRONOUSLY,
          # so a broken venv/holder fails here with a real error instead of
          # silently as "no process". The dump below also confirms the
          # long-lived process's real name/path (python.exe under
          # .venv\Scripts) rather than assuming it.
          & $py -c "import sys; print('sys.executable=', sys.executable); print('sys.prefix=', sys.prefix)"
          & $py -c "from PIL import Image, _imaging; print('PIL _imaging at', _imaging.__file__)"
          if ($LASTEXITCODE -ne 0) { throw "venv python cannot import Pillow C ext (exit $LASTEXITCODE)" }

          # Launch the long-lived holder from a SCRIPT FILE, not `-c`:
          # Start-Process mangles a `-c` string full of spaces/commas/
          # parens, so python got a broken program and exited instantly
          # (observed: launcher HasExited=True, zero python left). A file
          # path has no such quoting hazard.
          $holder = Join-Path $env:RUNNER_TEMP 'hold_venv.py'
          Set-Content -LiteralPath $holder -Encoding ascii -Value @(
            'from PIL import Image, _imaging',
            'import time',
            'time.sleep(900)')
          $proc = Start-Process -FilePath $py -ArgumentList $holder -PassThru
          Start-Sleep 6
          Write-Host "launcher pid=$($proc.Id) HasExited=$($proc.HasExited)"
          Write-Host "--- python-family processes now running ---"
          Get-CimInstance Win32_Process | Where-Object {
            $_.Name -eq 'python.exe' -or $_.Name -eq 'pythonw.exe' } |
            ForEach-Object { Write-Host "  $($_.Name) pid=$($_.ProcessId) path=$($_.ExecutablePath)" }

          # The uninstall fix kills python/pythonw whose ExecutablePath is
          # under {app}; the precondition asserts exactly that population is
          # non-empty (match by the real install path, any subdir).
          $running = Get-CimInstance Win32_Process | Where-Object {
            ($_.Name -eq 'python.exe' -or $_.Name -eq 'pythonw.exe') -and
            $_.ExecutablePath -and $_.ExecutablePath.StartsWith($install, [System.StringComparison]::OrdinalIgnoreCase) }
          if (-not $running) { throw "precondition failed: no venv python holding the lock" }
          Write-Host "holding python pid(s): $($running.ProcessId -join ',')"

      - name: Uninstall WHILE the pythonw is running
        shell: pwsh
        run: |
          $u = "$env:VS_INSTALL\unins000.exe"
          if (-not (Test-Path $u)) { throw "uninstaller missing: $u" }
          $p = Start-Process -FilePath $u -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
          Write-Host "uninstall exit=$($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "uninstall exited $($p.ExitCode) — scenario not exercised" }
          Start-Sleep 3
          # The uninstall fix kills venv python/pythonw, so nothing should
          # linger holding a lock on .venv.
          $left = Get-CimInstance Win32_Process | Where-Object {
            ($_.Name -eq 'pythonw.exe' -or $_.Name -eq 'python.exe') -and
            $_.ExecutablePath -like '*\VibeSeller\*' }
          if ($left) { throw "venv python still running after uninstall: $($left.ProcessId -join ',')" }

      - name: Reinstall
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "installer-dl\VibeSeller-Setup.exe" -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "reinstall exited $($p.ExitCode)" }

      - name: Assert the venv rebuilt + server healthy
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          foreach ($f in @('.venv\Scripts\python.exe','.venv\Scripts\playwright.exe','.venv\Scripts\vibe-seller.exe')) {
            if (-not (Test-Path "$install\$f")) { throw "missing after reinstall: $f (venv rebuild failed)" }
          }
          $env:PATH = "$install\.venv\Scripts;$install;$install\git\bin;$install\git\usr\bin;$env:PATH"
          $env:CLAUDE_CODE_GIT_BASH_PATH = "$install\git\bin\bash.exe"
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try { if ((Invoke-RestMethod http://127.0.0.1:7777/api/version -TimeoutSec 3).version) { $ok = $true; break } } catch { }
            Start-Sleep 2
          }
          & "$install\.venv\Scripts\vibe-seller.exe" stop --port 7777
          if (-not $ok) { throw "reinstalled server never became healthy" }
          Write-Host "OK: uninstall (python running) -> reinstall rebuilds the venv"
