name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Mirror what contributors run locally: `pre-commit run --all-files`.
      # Frontend hooks (frontend-lint, frontend-typecheck) are skipped here
      # because the frontend-test job below already runs the same checks
      # (`pnpm lint`, `pnpm exec tsc -b`) with full node_modules — running
      # them twice would just slow CI down. Python hooks (ruff lint, ruff
      # format), the line-limit script, and the file-hygiene hooks all run.
      - name: Run pre-commit
        env:
          SKIP: frontend-lint,frontend-typecheck
        uses: pre-commit/action@v3.0.1

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Matches install.sh's NODE_MIN_MAJOR (22). pnpm@latest
          # imports node:sqlite which only exists on Node 22+.
          node-version: '22'

      # Mirror install.sh / start.sh — both use pnpm. Using npm here
      # would silently bypass `frontend/pnpm-workspace.yaml` so CI's
      # dep state diverges from what end users get.
      - name: Install dependencies (pnpm — matches install.sh)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc -b

      - name: Run tests
        run: pnpm test

  backend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --local user.email "ci@vibe-seller.test"
          git config --local user.name "CI Bot"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv

      # No playwright install needed — browser-use comes via pyproject.toml
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: uv run pytest tests/unit -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unit
          name: unit-tests

  workflow-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv

      # No playwright install needed — browser-use comes via pyproject.toml
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Configure git identity
        run: |
          git config --local user.email "ci@vibe-seller.test"
          git config --local user.name "CI Bot"

      - name: Run workflow tests
        run: uv run pytest tests/workflow -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: workflow
          name: workflow-tests

  e2e-mock-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
          # pytest-playwright is dev-only — used by UI tests only
          uv pip install pytest-playwright

      # Playwright is dev-only — needed for UI tests (pytest-playwright)
      - name: Install Playwright browsers (UI tests only)
        run: uv run playwright install --with-deps chromium

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Matches install.sh's NODE_MIN_MAJOR (22). pnpm@latest
          # imports node:sqlite which only exists on Node 22+.
          node-version: '22'

      # Mirror install.sh / start.sh — both use pnpm, not npm. Using
      # npm here would silently bypass `frontend/pnpm-workspace.yaml`
      # (`allowBuilds:` for esbuild/core-js/protobufjs) so the CI
      # build state would diverge from what end users get.
      - name: Build frontend (pnpm — matches install.sh)
        working-directory: frontend
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --frozen-lockfile
          pnpm build

      - name: Configure git identity
        run: |
          git config --local user.email "ci@vibe-seller.test"
          git config --local user.name "CI Bot"

      - name: Kill leftover server
        run: lsof -ti:7777 | xargs kill -9 2>/dev/null || true

      - name: Clean stale data from previous runs
        run: rm -rf ~/.vibe-seller

      - name: Start server with mock CLI
        env:
          MOCK_CLI: tests/e2e/mock_cli.py
          VIBE_SELLER_TELEMETRY: '0'
        run: |
          mkdir -p logs
          BACKEND_PORT=7777 MOCK_CLI=tests/e2e/mock_cli.py \
            uv run uvicorn app.main:app \
            --host 0.0.0.0 --port 7777 --log-level info \
            > logs/mock_server_stdout.log 2>&1 &
          SERVER_PID=$!
          echo "Mock CLI server PID: $SERVER_PID"
          # 90s window (matches the e2e-test job): the cold first-boot
          # creates the shared agent venv, installs skill deps, and runs
          # the full skills+knowledge sync + DB init. On a contended
          # runner this regularly crossed 30s and false-failed while the
          # server was still in "Waiting for application startup" — the
          # loop exits early the instant /api/health responds, so the
          # larger ceiling only matters on the slowest cold boots.
          for i in {1..90}; do
            sleep 1
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server died on iteration $i"
              cat logs/mock_server_stdout.log
              exit 1
            fi
            if curl -s http://127.0.0.1:7777/api/health > /dev/null 2>&1; then
              echo "Server healthy after $i seconds"
              exit 0
            fi
          done
          echo "ERROR: Server failed health check"
          cat logs/mock_server_stdout.log
          exit 1

      - name: Run mock CLI E2E tests
        env:
          E2E_BASE_URL: http://127.0.0.1:7777
          MOCK_CLI: tests/e2e/mock_cli.py
        run: >
          uv run pytest tests/e2e/test_conversation_ui.py --e2e -v
          --log-cli-level=INFO

      - name: Stop mock CLI server
        if: always()
        run: lsof -ti:7777 | xargs kill -9 2>/dev/null || true

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mock-cli-server-logs
          path: logs/*.log
          retention-days: 14

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run integration tests
        run: uv run pytest tests/integration -v

  e2e-test:
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Kill leftover server
        run: lsof -ti:7777 | xargs kill -9 2>/dev/null || true

      # Clean BEFORE install: install.sh writes claude CLI to
      # ~/.vibe-seller/node_modules/.bin/claude. If we clean after,
      # the server starts with no claude and all tasks fail with
      # FileNotFoundError. Previous order only worked because old
      # containers had an accumulated global claude in ~/.npm-global/
      # from prior runs; clean images have no such fallback.
      - name: Clean stale data from previous runs
        run: rm -rf ~/.vibe-seller

      # Dogfood install.sh --dev so this job catches install.sh
      # regressions (missing claude/sqlite3/playwright/etc.) the
      # moment they land — same script every end user runs. --dev
      # detects the checkout, installs system deps (uv, node, pnpm,
      # sqlite3, lsof, claude), creates ./.venv, runs
      # `uv pip install -e .`, and installs Playwright Chromium.
      - name: Install via install.sh --dev
        run: ./install.sh --dev

      - name: Install pytest test-runner deps
        # The `.[dev]` extras (pyproject.toml) carry pytest +
        # pytest-asyncio + pytest-xdist + pytest-rerunfailures +
        # httpx + ruff. These are test-runner deps, never shipped
        # to end-user wheels. pytest-playwright is needed only by
        # the UI tests so it lives outside `.[dev]`.
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]" pytest-playwright

      - name: Configure git identity
        run: |
          git config --local user.email "ci@vibe-seller.test"
          git config --local user.name "CI Bot"

      - name: Start server
        # Use the documented user command, not raw uvicorn — that
        # way `_cmd_start`'s PATH augmentation (which makes claude
        # findable after `curl|bash install.sh`) is exercised by
        # CI on every PR. Env vars on this step propagate into
        # `vibe-seller start`'s parent shell and from there into
        # the daemon (cli.py copies os.environ).
        env:
          # No ANTHROPIC_* — conftest sets user's default_profile_id
          # to the worker profile, so even UI-created tasks use it.
          API_TIMEOUT_MS: 3000000
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: 1
          MAX_AGENT_CONCURRENCY: 9
          AGENT_DEBUG: '1'
          VIBE_SELLER_TELEMETRY: '0'
          # Vision e2e must be offline + deterministic: fake image
          # generation. The vision test module skips itself unless the
          # server reports fake mode.
          VISION_FAKE: '1'
        run: |
          source .venv/bin/activate
          echo "=== Starting server via vibe-seller CLI ==="
          echo "Claude CLI location: $(which claude || echo not-on-shell-PATH)"
          vibe-seller start --port 7777
          # 90s: cold first-boot (rm -rf ~/.vibe-seller above) runs the
          # full skills+knowledge sync + DB init, which crosses 30s on a
          # contended runner. Loop exits the instant /api/health responds.
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:7777/api/health > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Server failed to respond to health check"
          tail -50 ~/.vibe-seller/logs/backend_7777.log 2>/dev/null || true
          exit 1

      - name: Run E2E tests
        env:
          API_TIMEOUT_MS: 3000000
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: 1
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
          E2E_WORKERS: 4
          E2E_PROVIDER_MAP: minimax,minimax,glm,glm
        run: |
          E2E_N="${E2E_WORKERS:-0}"
          XDIST_ARGS=""
          if [ "$E2E_N" -gt 1 ] 2>/dev/null; then
            # --dist loadgroup so tests sharing a resource (the workspace
            # skill namespace is workspace-global, not per-worker) can pin
            # to one worker via @pytest.mark.xdist_group and never mutate
            # it concurrently. Ungrouped tests still distribute by load.
            XDIST_ARGS="-n $E2E_N --dist loadgroup"
          fi
          uv run pytest tests/e2e --e2e -v --log-cli-level=INFO \
            --reruns 1 \
            --only-rerun 'API Error: 529' \
            --only-rerun 'overloaded_error' \
            --only-rerun 'Agent stream stalled' \
            --only-rerun 'Connection closed mid-response' \
            --maxfail=1 \
            $XDIST_ARGS \
            --ignore=tests/e2e/test_chrome_backend.py

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-server-logs
          path: ~/.vibe-seller/logs/*.log
          retention-days: 14
