name: Windows Upgrade Test

# Release-only: proves the native Windows in-place upgrade works
# end-to-end. Heavy (two full installer builds), so it's called as a
# gate from release.yml (must pass before publish-testpypi) rather
# than triggered on pull requests — kept in its own file (no
# pull_request trigger) so it never shows up as a skipped check on
# PRs. `workflow_call` lets release.yml depend on it via `needs:`;
# `workflow_dispatch` keeps ad-hoc manual runs available. See
# installer/windows/README.md.

on:
  workflow_call:
  workflow_dispatch:

jobs:
  # Build two versions, install the old one, point the updater at a
  # LOCAL mock release (no real GitHub release), upgrade, and assert the
  # running server reports the NEW version + a smoke passes on it.
  upgrade:
    name: Upgrade old -> new (in-place)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build OLD installer (0.0.1)
        shell: pwsh
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: '0.0.1'
        run: |
          .\installer\windows\build.ps1 -AppVersion 0.0.1 `
            -StagingDir "$env:GITHUB_WORKSPACE\installer\windows\stagingA" `
            -OutputDir  "$env:GITHUB_WORKSPACE\installer\windows\outA"

      - name: Build NEW installer (0.0.2)
        shell: pwsh
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: '0.0.2'
        run: |
          .\installer\windows\build.ps1 -AppVersion 0.0.2 `
            -StagingDir "$env:GITHUB_WORKSPACE\installer\windows\stagingB" `
            -OutputDir  "$env:GITHUB_WORKSPACE\installer\windows\outB"

      - name: Install OLD (0.0.1)
        shell: pwsh
        run: |
          $exe = "$env:GITHUB_WORKSPACE\installer\windows\outA\VibeSeller-Setup.exe"
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "old installer exited $($p.ExitCode)" }
          echo "VS_INSTALL=$env:LOCALAPPDATA\Programs\VibeSeller" >> $env:GITHUB_ENV

      - name: Start OLD server, assert version 0.0.1
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\git\cmd;$install\git\bin;" +
                      "$install\git\usr\bin;$install\git\mingw64\bin;$env:PATH"
          $env:CLAUDE_CODE_GIT_BASH_PATH = "$install\git\bin\bash.exe"
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              $v = (Invoke-RestMethod http://127.0.0.1:7777/api/version -TimeoutSec 3).version
              Write-Host "version=$v"; if ($v -eq '0.0.1') { $ok = $true; break }
            } catch { }
            Start-Sleep 2
          }
          if (-not $ok) { throw "OLD server did not report 0.0.1" }

      - name: Updater detects + downloads NEW release (local mock)
        shell: pwsh
        # Set via the step env: key (not in-script $env:) so it reliably
        # reaches the python child. Plain local paths — no file:// URIs.
        env:
          VIBE_SELLER_RELEASES_URL: ${{ github.workspace }}\release.json
        run: |
          # Literal JSON via string concat. Forward-slash the WHOLE path
          # (incl. GITHUB_WORKSPACE, which has backslashes) so the JSON
          # has no invalid \escapes; UTF-8 no BOM.
          $ws = $env:GITHUB_WORKSPACE -replace '\\','/'
          $exeB = "$ws/installer/windows/outB/VibeSeller-Setup.exe"
          $rel = '{"tag_name":"v0.0.2","assets":[{"name":"VibeSeller-Setup.exe","browser_download_url":"' + $exeB + '"}]}'
          [System.IO.File]::WriteAllText($env:VIBE_SELLER_RELEASES_URL, $rel)
          Write-Host "RELEASES_URL=$env:VIBE_SELLER_RELEASES_URL"
          Get-Content $env:VIBE_SELLER_RELEASES_URL | Write-Host
          # Run from a neutral cwd (NOT the repo root) so `from app` and
          # importlib.metadata resolve the INSTALLED 0.0.1 package, not the
          # source tree (which the 0.0.2 build left metadata for).
          Set-Location $env:TEMP
          & "$env:VS_INSTALL\.venv\Scripts\python.exe" -c "import os; from pathlib import Path; import tempfile; from app import windows_update as w; print('VER', w.get_version()); print('REL', w._fetch_release()); u = w.check_for_update(); print('UPD', u); assert u and u['version'] == '0.0.2', u; p = w.download_installer(u['url'], Path(tempfile.gettempdir()) / 'dl.exe'); assert p.stat().st_size > 0; print('detected + downloaded', u['version'])"

      - name: Stop OLD server (release file locks)
        shell: pwsh
        run: '& "$env:VS_INSTALL\.venv\Scripts\vibe-seller.exe" stop --port 7777'

      - name: Upgrade in place (silent-install NEW)
        shell: pwsh
        run: |
          $exe = "$env:GITHUB_WORKSPACE\installer\windows\outB\VibeSeller-Setup.exe"
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "new installer exited $($p.ExitCode)" }

      - name: Start UPGRADED server, assert version 0.0.2
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          $env:PATH = "$install\.venv\Scripts;$install;$install\claude;" +
                      "$install\git\cmd;$install\git\bin;" +
                      "$install\git\usr\bin;$install\git\mingw64\bin;$env:PATH"
          $env:CLAUDE_CODE_GIT_BASH_PATH = "$install\git\bin\bash.exe"
          $env:VIBE_SELLER_BUNDLED_PYTHON = "$install\python\python.exe"
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              $v = (Invoke-RestMethod http://127.0.0.1:7777/api/version -TimeoutSec 3).version
              Write-Host "version=$v"; if ($v -eq '0.0.2') { $ok = $true; break }
            } catch { }
            Start-Sleep 2
          }
          if (-not $ok) { throw "UPGRADED server did not report 0.0.2 (upgrade failed)" }

      - name: Basic e2e on the UPGRADED build (health + store/profile API)
        shell: bash
        run: |
          export PATH="$VS_INSTALL/.venv/Scripts:$PATH"
          # Pass "" to skip verify_install.sh's `vibe-seller --version`
          # check (fragile under Git Bash with a Windows-path PATH). The
          # version-after-upgrade is already asserted authoritatively via
          # /api/version == 0.0.2 in the previous step; this step is the
          # API round-trip smoke on the upgraded build.
          bash tests/releases/verify_install.sh ""

      # Release-gate coverage for the uninstall->reinstall failure: a tray
      # pythonw.exe left running at uninstall locks .venv\Scripts\pythonw.exe,
      # so uninstall leaves a partial .venv and the next install's `uv venv`
      # refuses it (browser-engine step then fails "playwright.exe not
      # found"). Reproduce with a held-open venv python (native ext loaded)
      # and assert the rebuild. Reuses the NEW (outB) installer built above.
      - name: Uninstall (python running) -> reinstall rebuilds the venv
        shell: pwsh
        run: |
          $install = $env:VS_INSTALL
          $exe = "$env:GITHUB_WORKSPACE\installer\windows\outB\VibeSeller-Setup.exe"
          # Stop the server started above so only OUR pythonw holds a lock.
          & "$install\.venv\Scripts\vibe-seller.exe" stop --port 7777
          Start-Sleep 3
          # Hold a python process from the install alive with a native venv
          # extension loaded == a running tray locking a file inside .venv.
          # Importing Pillow's C ext locks .venv\Lib\site-packages\PIL\
          # _imaging*.pyd so the partial-.venv bug is actually reproduced; a
          # bare time.sleep would lock nothing in .venv. Launch from a SCRIPT
          # FILE (Start-Process mangles a spaces/commas/parens `-c` string,
          # so python would get broken source and exit instantly), and match
          # python.exe|pythonw.exe under the install dir (both the venv
          # python.exe and the bundled {app}\python\python.exe show up). See
          # windows-installer.yml for the full rationale.
          $py = "$install\.venv\Scripts\python.exe"
          $holder = Join-Path $env:RUNNER_TEMP 'hold_venv.py'
          Set-Content -LiteralPath $holder -Encoding ascii -Value @(
            'from PIL import Image, _imaging',
            'import time',
            'time.sleep(900)')
          Start-Process -FilePath $py -ArgumentList $holder | Out-Null
          Start-Sleep 6
          if (-not (Get-CimInstance Win32_Process | Where-Object {
            ($_.Name -eq 'python.exe' -or $_.Name -eq 'pythonw.exe') -and
            $_.ExecutablePath -and $_.ExecutablePath.StartsWith($install, [System.StringComparison]::OrdinalIgnoreCase) })) {
            throw "precondition failed: no venv python holding the lock"
          }
          $p = Start-Process -FilePath "$install\unins000.exe" -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
          Write-Host "uninstall exit=$($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "uninstall exited $($p.ExitCode) — scenario not exercised" }
          Start-Sleep 3
          if (Get-CimInstance Win32_Process | Where-Object {
            ($_.Name -eq 'pythonw.exe' -or $_.Name -eq 'python.exe') -and
            $_.ExecutablePath -like '*\VibeSeller\*' }) {
            throw "venv python still running after uninstall"
          }
          $p = Start-Process -FilePath $exe -Wait -PassThru `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS'
          if ($p.ExitCode -ne 0) { throw "reinstall exited $($p.ExitCode)" }
          foreach ($f in @('.venv\Scripts\python.exe','.venv\Scripts\playwright.exe','.venv\Scripts\vibe-seller.exe')) {
            if (-not (Test-Path "$install\$f")) { throw "missing after reinstall: $f (venv rebuild failed)" }
          }
          & "$install\.venv\Scripts\vibe-seller.exe" start --port 7777
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            try { if ((Invoke-RestMethod http://127.0.0.1:7777/api/version -TimeoutSec 3).version) { $ok = $true; break } } catch { }
            Start-Sleep 2
          }
          & "$install\.venv\Scripts\vibe-seller.exe" stop --port 7777
          if (-not $ok) { throw "reinstalled server never became healthy" }
          Write-Host "OK: uninstall (python running) -> reinstall rebuilds the venv"

      - name: Stop server + dump logs
        if: always()
        shell: pwsh
        run: |
          & "$env:VS_INSTALL\.venv\Scripts\vibe-seller.exe" stop --port 7777
          $log = "$env:USERPROFILE\.vibe-seller\logs\backend_7777.log"
          if (Test-Path $log) { Get-Content -Tail 40 $log }
