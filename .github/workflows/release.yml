name: Release

# Triggered by a `v*` tag. Seven stages, fail-fast:
#
#   1. windows-upgrade-test  Calls windows-upgrade.yml (reusable). Proves
#                         the native Windows in-place upgrade works
#                         end-to-end. Gates publish-testpypi — nothing
#                         is published anywhere, not even TestPyPI, if
#                         the Windows upgrade path is broken.
#   2. build              Produces TWO wheels in the same checkout:
#                         - dist-pypi/      canonical (version from tag)
#                         - dist-testpypi/  dev-versioned (`<tag>.devYYYYMMDDHHMMSS`)
#                         so the TestPyPI verification stage can iterate
#                         across runs without colliding with previous
#                         uploads (PyPI/TestPyPI versions are immutable).
#   3. publish-testpypi   Publish the dev-versioned wheel. Needs both
#                         `build` and `windows-upgrade-test`.
#   4. verify-testpypi    Fresh runner: install via `install.sh --test-pypi
#                         --version <dev>`, start server, run
#                         `tests/releases/verify_install.sh <dev>` — asserts
#                         `vibe-seller --version` matches, /api/health is
#                         200, and POST/GET round-trips on /api/stores +
#                         /api/profiles. Gates the production publish.
#   4b. verify-upgrade-testpypi  Fresh runner: install the PREV dev build,
#                         verify it, then `vibe-seller upgrade --test-pypi
#                         --version <new>` (the real CLI command, running on
#                         the PREV install) and re-verify — proving the
#                         in-place upgrade path works BEFORE we publish to
#                         PyPI. Also gates the production publish. Both dev
#                         builds come from THIS checkout (build stage) so
#                         PREV already carries the `--test-pypi` flag.
#   5. publish-pypi       Publish the canonical wheel.
#   6. verify-pypi        Re-run the same smoke against PyPI (post-publish
#                         audit; same script, different version + source).
#   7. github-release     Draft a GitHub Release with auto-generated notes.
#
# Prerequisites (one-time, per index):
#
#   PyPI (https://pypi.org/manage/account/publishing/)
#     project: vibe-seller    owner: zpoint    repo: vibe-seller
#     workflow: release.yml   environment: pypi
#
#   TestPyPI (https://test.pypi.org/manage/account/publishing/)
#     project: vibe-seller    owner: zpoint    repo: vibe-seller
#     workflow: release.yml   environment: test-pypi
#
#   GitHub environments `pypi` and `test-pypi` must exist on the repo.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  windows-upgrade-test:
    name: Windows Upgrade Test (gate)
    uses: ./.github/workflows/windows-upgrade.yml

  build:
    name: Build wheels (canonical + testpypi-dev)
    runs-on: ubuntu-latest
    outputs:
      dev_version: ${{ steps.build_testpypi.outputs.dev_version }}
      dev_version_prev: ${{ steps.build_testpypi.outputs.dev_version_prev }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full tag history

      # --- Frontend build (staged into the wheel as package data) ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Stage built frontend into the package
        # pyproject.toml's [tool.setuptools.package-data] includes
        # `static/**/*`. Copying the build output here is what makes
        # `pip install vibe-seller` ship a working web UI.
        run: |
          rm -rf app/static
          mkdir -p app/static
          cp -r frontend/dist/. app/static/

      # --- Python build (twice: canonical for PyPI, dev for TestPyPI) ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build canonical wheel (for PyPI)
        # Tag-derived version, e.g. v0.0.1 → 0.0.1.
        run: python -m build --outdir dist-pypi

      - name: Build dev-versioned wheels (for TestPyPI)
        id: build_testpypi
        # `SETUPTOOLS_SCM_PRETEND_VERSION` overrides the tag-derived
        # version. We stamp it with UTC seconds so every workflow run
        # gets a unique, immutable upload, e.g.
        # `0.0.1.dev20260514120555`.
        #
        # Build TWO dev wheels — PREV (older) and NEW — from THIS SAME
        # checkout so the verify-upgrade job can exercise `vibe-seller
        # upgrade --test-pypi` prev→new. Both must be same-code: the
        # upgrade command runs on the PREV install, so PREV must already
        # carry the `--test-pypi` flag (a previously-RELEASED version
        # wouldn't). `dev$((TS-1))` < `dev$TS`, so NEW is a real upgrade.
        run: |
          TS=$(date -u +%Y%m%d%H%M%S)
          DEV_VERSION="${GITHUB_REF_NAME#v}.dev${TS}"
          DEV_VERSION_PREV="${GITHUB_REF_NAME#v}.dev$((TS - 1))"
          echo "==> prev dev: $DEV_VERSION_PREV ; new dev: $DEV_VERSION"
          SETUPTOOLS_SCM_PRETEND_VERSION="$DEV_VERSION_PREV" \
            python -m build --outdir dist-testpypi
          SETUPTOOLS_SCM_PRETEND_VERSION="$DEV_VERSION" \
            python -m build --outdir dist-testpypi
          echo "dev_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "dev_version_prev=$DEV_VERSION_PREV" >> "$GITHUB_OUTPUT"

      - name: Verify both wheels bundle frontend assets
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          for label, pattern in [('PyPI', 'dist-pypi/*.whl'), ('TestPyPI', 'dist-testpypi/*.whl')]:
              wheels = glob.glob(pattern)
              assert wheels, f'no {label} wheel produced'
              wheel = wheels[0]
              with zipfile.ZipFile(wheel) as z:
                  names = z.namelist()
                  static = [n for n in names if n.startswith('app/static/')]
                  has_index = any(n == 'app/static/index.html' for n in static)
                  if not has_index:
                      print(f'  FAILED ({label}): app/static/index.html missing in {wheel}')
                      sys.exit(1)
                  print(f'OK ({label}): {wheel} ships {len(static)} static entries')
          PY

      - name: Upload canonical wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-pypi
          path: dist-pypi/

      - name: Upload testpypi-dev wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-testpypi
          path: dist-testpypi/

  publish-testpypi:
    name: Publish to TestPyPI (dev-versioned)
    needs: [build, windows-upgrade-test]
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/vibe-seller
    permissions:
      id-token: write
    steps:
      - name: Download testpypi wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-testpypi
          path: dist/

      - name: Publish via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    name: Verify install — TestPyPI (gates real release)
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build.outputs.dev_version }}
      SIMPLE_INDEX: https://test.pypi.org/simple/vibe-seller/
    steps:
      - uses: actions/checkout@v4

      - name: Wait for TestPyPI /simple/ index to see the new version
        # Poll the SIMPLE index (what uv/pip read) rather than the JSON
        # API. TestPyPI runs them on separate caches — JSON can return
        # 200 well before the simple index catches up, leading to a
        # spurious "no version found" from uv.
        run: |
          echo "Waiting for vibe-seller==$VERSION at $SIMPLE_INDEX..."
          for i in $(seq 1 60); do
            if curl -fsS "$SIMPLE_INDEX" 2>/dev/null | grep -qF "$VERSION"; then
              echo "  visible in simple index after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: vibe-seller==$VERSION not visible on simple index after 120s"
          curl -fsS "$SIMPLE_INDEX" 2>/dev/null | head -30 || true
          exit 1

      - name: Install via install.sh --test-pypi --version
        run: ./install.sh --test-pypi --version "$VERSION"

      - name: Start server (background)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller start --port 7777

      - name: Smoke-test (verify_install.sh asserts version + API)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          bash tests/releases/verify_install.sh "$VERSION"

      # Below: run a real agent task against the installed daemon.
      # This exercises the per-store browser-use wrapper — the exact
      # code path that was silently broken in 0.0.1 when installed
      # via `uv tool install` (the tool venv's bin/ is not on PATH,
      # so wrapper.py's `shutil.which('browser-use')` returned None
      # and the wrapper baked in the literal string `"browser-use"`,
      # which then failed at exec time with "command not found").
      # Without this step, verify only proves the daemon stands up
      # — not that browser tasks work end-to-end.
      # Inject pytest test-runner deps INTO the uv-tool venv that
      # install.sh just created. That venv already has playwright
      # (browser-use dep), so pytest runs from the same interpreter
      # the daemon does and resolves every module the test imports
      # without duplicate installs.
      - name: Install pytest runner deps into the tool venv
        run: |
          TOOL_PY="$(uv tool dir)/vibe-seller/bin/python"
          uv pip install --python "$TOOL_PY" \
            pytest pytest-asyncio httpx pytest-playwright

      - name: Run agent smoke against installed daemon
        env:
          E2E_BASE_URL: http://127.0.0.1:7777
          E2E_PROVIDER_MAP: deepseek
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL:    ${{ secrets.DEEPSEEK_MODEL }}
          API_TIMEOUT_MS: '3000000'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
          VIBE_SELLER_TELEMETRY: '0'
        run: |
          export PATH="$(uv tool dir)/vibe-seller/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          pytest \
            tests/e2e/test_llm_browser.py::TestLLMBrowserAPI::test_agent_reads_homepage \
            --e2e -v --log-cli-level=INFO

      - name: Stop server
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller stop --port 7777 || true
          echo "--- last 30 lines of server log ---"
          tail -30 ~/.vibe-seller/logs/backend_7777.log 2>/dev/null || true

  verify-upgrade-testpypi:
    name: Verify in-place upgrade (prev → new, gates release)
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    env:
      PREV: ${{ needs.build.outputs.dev_version_prev }}
      NEW: ${{ needs.build.outputs.dev_version }}
      SIMPLE_INDEX: https://test.pypi.org/simple/vibe-seller/
    steps:
      - uses: actions/checkout@v4

      - name: Wait for both dev versions on the TestPyPI simple index
        run: |
          for want in "$PREV" "$NEW"; do
            echo "waiting for vibe-seller==$want ..."
            ok=0
            for _ in $(seq 1 60); do
              if curl -fsS "$SIMPLE_INDEX" 2>/dev/null | grep -qF "$want"; then
                ok=1; break
              fi
              sleep 2
            done
            [ "$ok" = 1 ] || { echo "ERROR: $want not on simple index"; exit 1; }
          done

      - name: Install the PREVIOUS build from TestPyPI
        run: ./install.sh --test-pypi --version "$PREV"

      - name: Old version stands up (server + API round-trips)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller start --port 7777
          bash tests/releases/verify_install.sh "$PREV"
          vibe-seller stop --port 7777

      - name: In-place upgrade via the real CLI command
        # The whole point: exercise `vibe-seller upgrade` itself (running
        # on the PREV install, as a real user would) pointed at the new
        # build. GATES the PyPI publish — a broken upgrade path never
        # reaches real users. Both builds are same-code, so PREV already
        # carries the `--test-pypi` flag this step relies on.
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller upgrade --test-pypi --version "$NEW"

      - name: New version stands up + --version bumped
        # verify_install.sh asserts `vibe-seller --version == NEW` plus
        # /api/health + store/profile round-trips — the same smoke reused
        # from the fresh-install verify stages.
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller start --port 7777
          bash tests/releases/verify_install.sh "$NEW"
          vibe-seller stop --port 7777

      - name: Stop server + dump logs
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller stop --port 7777 || true
          tail -30 ~/.vibe-seller/logs/backend_7777.log 2>/dev/null || true

  publish-pypi:
    name: Publish to PyPI (canonical)
    needs: [verify-testpypi, verify-upgrade-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vibe-seller
    permissions:
      id-token: write
    steps:
      - name: Download canonical wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-pypi
          path: dist/

      - name: Publish via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi:
    name: Verify install — PyPI (post-publish audit)
    needs: publish-pypi
    runs-on: ubuntu-latest
    env:
      # Strip the leading `v` from the tag — pip/uv take 0.0.1, not v0.0.1.
      VERSION: ${{ github.ref_name }}
      SIMPLE_INDEX: https://pypi.org/simple/vibe-seller/
    steps:
      - uses: actions/checkout@v4

      - name: Normalise tag → version
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Wait for PyPI /simple/ index to see the new version
        # Same reason as TestPyPI verify: poll the simple index (what
        # uv reads) instead of the JSON API, which can lag behind.
        run: |
          echo "Waiting for vibe-seller==$VERSION at $SIMPLE_INDEX..."
          for i in $(seq 1 60); do
            if curl -fsS "$SIMPLE_INDEX" 2>/dev/null | grep -qF "$VERSION"; then
              echo "  visible in simple index after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: vibe-seller==$VERSION not visible on PyPI simple index after 120s"
          exit 1

      - name: Install via install.sh --version (no --test-pypi)
        run: ./install.sh --version "$VERSION"

      - name: Start server (background)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller start --port 7777

      - name: Smoke-test (verify_install.sh asserts version + API)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          bash tests/releases/verify_install.sh "$VERSION"

      # Below: run a real agent task against the installed daemon.
      # This exercises the per-store browser-use wrapper — the exact
      # code path that was silently broken in 0.0.1 when installed
      # via `uv tool install` (the tool venv's bin/ is not on PATH,
      # so wrapper.py's `shutil.which('browser-use')` returned None
      # and the wrapper baked in the literal string `"browser-use"`,
      # which then failed at exec time with "command not found").
      # Without this step, verify only proves the daemon stands up
      # — not that browser tasks work end-to-end.
      # Inject pytest test-runner deps INTO the uv-tool venv that
      # install.sh just created. That venv already has playwright
      # (browser-use dep), so pytest runs from the same interpreter
      # the daemon does and resolves every module the test imports
      # without duplicate installs.
      - name: Install pytest runner deps into the tool venv
        run: |
          TOOL_PY="$(uv tool dir)/vibe-seller/bin/python"
          uv pip install --python "$TOOL_PY" \
            pytest pytest-asyncio httpx pytest-playwright

      - name: Run agent smoke against installed daemon
        env:
          E2E_BASE_URL: http://127.0.0.1:7777
          E2E_PROVIDER_MAP: deepseek
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL:    ${{ secrets.DEEPSEEK_MODEL }}
          API_TIMEOUT_MS: '3000000'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
          VIBE_SELLER_TELEMETRY: '0'
        run: |
          export PATH="$(uv tool dir)/vibe-seller/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          pytest \
            tests/e2e/test_llm_browser.py::TestLLMBrowserAPI::test_agent_reads_homepage \
            --e2e -v --log-cli-level=INFO

      - name: Stop server
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          vibe-seller stop --port 7777 || true
          echo "--- last 30 lines of server log ---"
          tail -30 ~/.vibe-seller/logs/backend_7777.log 2>/dev/null || true

  build-windows-installer:
    name: Build Windows installer (for the release)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs tag history for the version
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer (version from tag)
        shell: pwsh
        run: |
          $ver = "${env:GITHUB_REF_NAME}".TrimStart('v')
          .\installer\windows\build.ps1 -AppVersion $ver
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSeller-Setup
          path: installer/windows/out/VibeSeller-Setup.exe
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: [verify-pypi, build-windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download canonical wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-pypi
          path: dist/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: VibeSeller-Setup
          path: dist-win/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/* dist-win/VibeSeller-Setup.exe
